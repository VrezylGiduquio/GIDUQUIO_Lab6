<div class="card p-4 shadow-sm">

  <h3 class="mb-3">
    Reset Password
  </h3>

  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">

    <div class="mb-3">
      <label>New Password</label>

      <input
        type="password"
        class="form-control"
        formControlName="password"
      >
    </div>

    <button class="btn btn-success w-100">
      Update Password
    </button>

  </form>
</div>
