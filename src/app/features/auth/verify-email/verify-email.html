<div class="card p-4 shadow-sm text-center">
  <h3 class="mb-3">Verify Email</h3>

  @if (isLoading) {
    <p class="mb-0">{{ message }}</p>
  } @else {
    <div [class]="isSuccess ? 'alert alert-success mb-3' : 'alert alert-danger mb-3'">
      {{ message }}
    </div>

    <a routerLink="/login" class="btn btn-dark">
      Go to login
    </a>
  }
</div>
