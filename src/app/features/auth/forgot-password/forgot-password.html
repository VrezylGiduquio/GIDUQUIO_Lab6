<div class="card p-4 shadow-sm">

  <h3 class="mb-3">
    Forgot Password
  </h3>

  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">

    <div class="mb-3">
      <label>Email</label>

      <input
        type="email"
        class="form-control"
        formControlName="email"
      >
    </div>

    <button class="btn btn-primary w-100">
      Send Reset Link
    </button>

  </form>
</div>
