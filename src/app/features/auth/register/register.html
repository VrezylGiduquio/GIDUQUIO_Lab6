<h2 class="text-center mb-4">
  Register
</h2>

<form
  [formGroup]="registerForm"
  (ngSubmit)="onSubmit()"
>

  <div class="mb-3">
    <label class="form-label">
      First Name
    </label>

    <input
      type="text"
      class="form-control"
      formControlName="firstName"
    />
  </div>

  <div class="mb-3">
    <label class="form-label">
      Last Name
    </label>

    <input
      type="text"
      class="form-control"
      formControlName="lastName"
    />
  </div>

  <div class="mb-3">
    <label class="form-label">
      Email
    </label>

    <input
      type="email"
      class="form-control"
      formControlName="email"
    />
  </div>

  <div class="mb-3">
    <label class="form-label">
      Password
    </label>

    <input
      type="password"
      class="form-control"
      formControlName="password"
    />
  </div>

  <div class="mb-3">
    <label class="form-label">
      Confirm Password
    </label>

    <input
      type="password"
      class="form-control"
      formControlName="confirmPassword"
    />
  </div>

  <button
    type="submit"
    class="btn btn-dark w-100"
  >
    Register
  </button>

</form>

<div class="text-center mt-3">
  <a routerLink="/login">
    Already have an account?
  </a>
</div>
